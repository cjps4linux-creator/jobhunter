apiVersion: apps/v1
kind: Deployment
metadata:
  name: jobhunter-backend
  labels:
    app: jobhunter-backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: jobhunter-backend
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: jobhunter-backend
    spec:
      nodeSelector:
        kubernetes.io/os: linux
      containers:
        - name: backend
          image: jobhunter-backend:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
              name: http
          env:
            - name: LOG_LEVEL
              valueFrom:
                configMapKeyRef:
                  name: jobhunter-backend
                  key: log_level
          readinessProbe:
            httpGet:
              path: /ready
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 20
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 250m
              memory: 256Mi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
